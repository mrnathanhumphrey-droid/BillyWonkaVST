name: Build BW BASS

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Win64
            cmake_generator: Ninja
            cmake_args: ""
            artifact_name: BW_BASS_Win64
          - os: macos-latest
            name: macOS
            cmake_generator: Ninja
            cmake_args: "-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
            artifact_name: BW_BASS_macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone JUCE
        run: git clone --depth 1 --branch 8.0.6 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release -j 2

      # ---- Windows packaging ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          DIST="dist/${{ matrix.artifact_name }}"
          mkdir -p "$DIST/VST3" "$DIST/Standalone" "$DIST/Presets/Factory"
          cp -r build/GrooveEngineRnB_artefacts/Release/VST3/*.vst3 "$DIST/VST3/"
          cp build/GrooveEngineRnB_artefacts/Release/Standalone/*.exe "$DIST/Standalone/"
          cp Presets/Factory/*.xml "$DIST/Presets/Factory/"
          cp dist/BW_BASS_v1.0.0_Win64/Install.bat "$DIST/" 2>/dev/null || true
          cp dist/BW_BASS_v1.0.0_Win64/README.txt "$DIST/" 2>/dev/null || true

      # ---- macOS packaging ----
      - name: List build artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: find build/GrooveEngineRnB_artefacts -type f | head -50

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DIST="dist/${{ matrix.artifact_name }}"
          mkdir -p "$DIST/VST3" "$DIST/AU" "$DIST/Standalone" "$DIST/Presets/Factory"

          # Ninja is single-config so artifacts may be in Release/ or directly in artefacts/
          ARTS="build/GrooveEngineRnB_artefacts"
          if [ -d "$ARTS/Release" ]; then
            ARTS="$ARTS/Release"
          fi

          echo "Artifact root: $ARTS"
          ls -R "$ARTS" || true

          # VST3
          find "$ARTS" -name "*.vst3" -type d | head -1 | while read vst3; do
            echo "Copying VST3: $vst3"
            cp -R "$vst3" "$DIST/VST3/"
          done

          # AU
          find "$ARTS" -name "*.component" -type d | head -1 | while read au; do
            echo "Copying AU: $au"
            cp -R "$au" "$DIST/AU/"
          done

          # Standalone
          find "$ARTS" -name "*.app" -type d | head -1 | while read app; do
            echo "Copying Standalone: $app"
            cp -R "$app" "$DIST/Standalone/"
          done

          # Presets
          cp Presets/Factory/*.xml "$DIST/Presets/Factory/"

          # Install script and README
          cp scripts/install_mac.sh "$DIST/install.sh"
          chmod +x "$DIST/install.sh"
          cp scripts/README_mac.txt "$DIST/README.txt"

          # Verify package contents
          echo "=== Package contents ==="
          find "$DIST" -type f | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}/
          retention-days: 30

  # ---- Create release on tag push ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
